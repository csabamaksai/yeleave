<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YeLeave & Timesheet{% endblock %}</title>
    <!-- Tailwind CSS (Play CDN for rapid development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0052CC', /* A Jira-szerű kék szín */
                    }
                }
            }
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 text-sm font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-12">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2 font-bold text-gray-900">
                        <!-- Placeholder Logo -->
                        <div class="w-6 h-6 bg-brand rounded flex items-center justify-center text-white text-xs">Y</div>
                        YeLeave
                    </a>
                    <div class="hidden sm:ml-8 sm:flex sm:space-x-4">
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Dashboard</a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Timesheet</a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Leaves</a>
                    </div>
                </div>
                <div class="flex items-center">
                    {% if user.is_authenticated %}
                        <span class="text-gray-500 mr-4">{{ user.email }}</span>
                        <!-- Később ide jöhet a logout gomb -->
                    {% else %}
                        <a href="#" class="text-gray-500 hover:text-gray-700 font-medium">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}
        {% endblock content %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
