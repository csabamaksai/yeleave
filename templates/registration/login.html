{% extends "base.html" %}

{% block title %}Login - YeLeave{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-sm border border-gray-100">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold flex items-center justify-center gap-2">
            <div class="w-8 h-8 bg-brand rounded flex items-center justify-center text-white text-sm">Y</div>
            YeLeave
        </h2>
        <p class="text-gray-500 mt-2">Jelentkezz be a fiókodba</p>
    </div>

    {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">
            Helytelen felhasználónév vagy jelszó. Kérjük, próbáld újra.
        </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Felhasználónév vagy Email</label>
                <div class="mt-1">
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm">
                </div>
            </div>
            
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Jelszó</label>
                <div class="mt-1">
                    <input type="password" name="password" autocomplete="current-password" required id="id_password" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm">
                </div>
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand">
                Bejelentkezés
            </button>
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
        </div>
    </form>
</div>
{% endblock %}
